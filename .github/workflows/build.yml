name: Build and Publish NuGet

on:
  push:
    branches:
      - main
      - develop
      - 'feature/*'
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          10.0.x

    - name: Restore NuGet packages
      run: dotnet restore src/Umbraco.Community.AzureSSO.slnx

    - name: Build
      run: dotnet build src/Umbraco.Community.AzureSSO.slnx --configuration Release

    - name: Set version number from tag
      if: startsWith(github.ref, 'refs/tags/')
      shell: pwsh
      run: |
        $version = "${{ github.ref_name }}"
        echo "PACKAGE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
      
    - name: Pack NuGet package
      if: startsWith(github.ref, 'refs/tags/')
      run: dotnet pack src/Umbraco.Community.AzureSSO.slnx --configuration Release --output nuget /p:PackageVersion=${{ env.PACKAGE_VERSION }}
          
    - name: Publish NuGet package
      if: startsWith(github.ref, 'refs/tags/')
      run: dotnet nuget push nuget/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://www.nuget.org/
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
